<!doctype html>
<html lang="en">
  <head>

    <link

    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #111a13;
        color: #e8f5ea;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── NAV ── */
      .navbar {
        background-color: #1a1a1a;
        height: 60px;
        display: flex;
        align-items: center;
        padding: 0 24px;
        border-bottom: 1px solid #2a2a2a;
      }

      /* LEFT GROUP */
      .nav-left {
        display: flex;
        align-items: center;
        gap: 28px; /* cleaner spacing */
      }

      /* LOGO */
      .logo-container {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }

      .nav-logo {
        height: 38px;
        width: 38px;
        border-radius: 6px;
      }

      /* 7TV PAINT TEXT */
      .logo-text {
        font-size: 1.6rem;
        font-weight: 900;
        letter-spacing: -0.5px;

        background-image: url("https://cdn.7tv.app/paint/01JHXJFACX42RV996VE9933TB8/layer/01JMMQ2PBAK6PK2XYX8NT1QYB4/4x.webp");
        background-size: cover;
        background-position: center;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      /* TABS */
      .nav-tabs {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .nav-tab {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: #888;
        font-size: 0.88rem;
        font-weight: 600;
        padding: 7px 14px;
        border-radius: 6px;
        transition: all 0.15s ease;
      }

      .nav-tab:hover {
        color: #fff;
        background: #222;
      }

      .nav-tab.active {
        color: #10b981;
        background: rgba(16, 185, 129, 0.12);
      }

      /* ── CENTER ── */
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        text-align: center;
      }

      .avatar {
        width: 96px;
        height: 96px;
        border-radius: 12px;
        display: block;
        margin-bottom: 16px;
        border: 2px solid #1f3d24;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 6px;
        color: #e8f5ea;
      }

      .tagline {
        color: #7aad82;
        font-size: 0.9rem;
        margin-bottom: 32px;
      }

      .info-lines {
        display: flex;
        flex-direction: column;
        gap: 14px;
        font-size: 0.92rem;
        color: #c5e8c8;
      }

      .info-line {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      code {
        font-family: "Courier New", monospace;
        font-size: 0.85rem;
        background: #1a2e1d;
        border: 1px solid #2a4a2e;
        color: #4ade80;
        padding: 2px 8px;
        border-radius: 4px;
      }

      a.inline-link {
        color: #4ade80;
        text-decoration: none;
      }

      a.inline-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
